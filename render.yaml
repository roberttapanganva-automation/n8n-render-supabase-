services:
  - type: web
    name: robert-n8n
    plan: free
    runtime: image

    image:
      url: docker.io/n8nio/n8n:2.16.0

    healthCheckPath: /healthz/readiness

    envVars:
      - key: PORT
        value: 5678

      - key: N8N_PORT
        value: 5678

      - key: N8N_PROTOCOL
        value: https

      - key: N8N_PROXY_HOPS
        value: 1

      - key: GENERIC_TIMEZONE
        value: Asia/Manila

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: DB_TYPE
        value: postgresdb

      - key: DB_POSTGRESDB_HOST
        sync: false

      - key: DB_POSTGRESDB_PORT
        value: 5432

      - key: DB_POSTGRESDB_DATABASE
        value: postgres

      - key: DB_POSTGRESDB_USER
        sync: false

      - key: DB_POSTGRESDB_PASSWORD
        sync: false

      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: false
