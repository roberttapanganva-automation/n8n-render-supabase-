services:
  - type: web
    name: robert-n8n
    plan: free
    runtime: image

    image:
      url: docker.n8n.io/n8nio/n8n:2.25.4

    healthCheckPath: /healthz/readiness

    envVars:
      - key: PORT
        value: "5678"

      - key: N8N_PORT
        value: "5678"

      - key: N8N_LISTEN_ADDRESS
        value: "0.0.0.0"

      - key: N8N_PROTOCOL
        value: "https"

      - key: N8N_HOST
        value: "robert-n8n.onrender.com"

      - key: WEBHOOK_URL
        value: "https://robert-n8n.onrender.com/"

      - key: N8N_EDITOR_BASE_URL
        value: "https://robert-n8n.onrender.com/"

      - key: N8N_PROXY_HOPS
        value: "1"

      - key: GENERIC_TIMEZONE
        value: "Asia/Manila"

      - key: TZ
        value: "Asia/Manila"

      # IMPORTANT:
      # Set this manually in Render Environment.
      # Do not regenerate this after credentials already exist.
      - key: N8N_ENCRYPTION_KEY
        sync: false

      - key: DB_TYPE
        value: "postgresdb"

      - key: DB_POSTGRESDB_HOST
        sync: false

      - key: DB_POSTGRESDB_PORT
        value: "5432"

      - key: DB_POSTGRESDB_DATABASE
        value: "postgres"

      - key: DB_POSTGRESDB_USER
        sync: false

      - key: DB_POSTGRESDB_PASSWORD
        sync: false

      - key: DB_POSTGRESDB_SCHEMA
        value: "public"

      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"

      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      - key: DB_POSTGRESDB_POOL_SIZE
        value: "2"

              # Give the main n8n process more JavaScript heap
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"

      # Keep task-runner memory usage low on Render Free
      - key: N8N_RUNNERS_MAX_CONCURRENCY
        value: "1"

      - key: N8N_RUNNERS_MAX_OLD_SPACE_SIZE
        value: "128"
